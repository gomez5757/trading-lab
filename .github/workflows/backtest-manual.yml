name: Manual Backtest

on:
  workflow_dispatch:
    inputs:
      config:
        description: Config file
        required: true
        default: configs/base.yaml

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run backtest
        run: python scripts/run_backtest.py --config "${{ inputs.config }}"
      - name: Validate outputs
        run: python scripts/validate_results.py outputs/backtest/metrics.json outputs/backtest/trades.csv outputs/backtest/equity_curve.csv
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: backtest-outputs
          path: outputs/backtest
